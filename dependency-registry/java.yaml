# yaml-language-server: $schema=./schema.yaml
language: java
dependencies:
  - group: com.google.guava
    artifact: guava
    versions:
      - version: "33.2.1-jre"
        allowed_scopes:
          - "identity-server"
      - version: "32.1.3-jre"
        allowed_scopes:
          - "api-manager"

  - group: com.fasterxml.jackson.core
    artifact: jackson-databind
    versions:
      - version: "2.17.0"
        allowed_scopes:
          - "api-manager"
