$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://wso2.github.io/engineering-governance/dependency-registry.schema.yaml"
title: "WSO2 Dependency Registry Schema"
type: object
additionalProperties: false
required:
  - language
  - dependencies

properties:
  language:
    type: string
    enum: [java, javascript, go]

  dependencies:
    type: array
    minItems: 1
    items:
      type: object

allOf:
  - if:
      properties:
        language:
          const: java
    then:
      properties:
        dependencies:
          items:
            $ref: "#/$defs/javaDependency"

  - if:
      properties:
        language:
          const: javascript
    then:
      properties:
        dependencies:
          items:
            $ref: "#/$defs/javascriptDependency"

  - if:
      properties:
        language:
          const: go
    then:
      properties:
        dependencies:
          items:
            $ref: "#/$defs/goDependency"

$defs:
  scopeName:
    type: string
    pattern: "^\\*$|^[a-z0-9][a-z0-9-]*$"

  allowedScopes:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: "#/$defs/scopeName"

  versionEntry:
    type: object
    additionalProperties: false
    required:
      - version
      - allowed_scopes
    properties:
      version:
        type: string
        minLength: 1
      allowed_scopes:
        $ref: "#/$defs/allowedScopes"

  javaDependency:
    type: object
    additionalProperties: false
    required:
      - group
      - artifact
      - versions
    properties:
      group:
        type: string
        minLength: 1
      artifact:
        type: string
        minLength: 1
      versions:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/versionEntry"

  javascriptDependency:
    type: object
    additionalProperties: false
    required:
      - package
      - versions
    properties:
      package:
        type: string
        minLength: 1
      versions:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/versionEntry"

  goDependency:
    type: object
    additionalProperties: false
    required:
      - module
      - versions
    properties:
      module:
        type: string
        minLength: 1
      versions:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/versionEntry"
