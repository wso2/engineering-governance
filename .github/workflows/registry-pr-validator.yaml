name: Dependency Registry PR Validator

on:
  pull_request:
    paths:
      - 'dependency-registry/*.yaml'
      - '.github/workflows/registry-pr-validator.yaml'

jobs:
  # 1. Catch basic YAML syntax and indentation errors
  yaml-lint:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: dependency-registry/
          config_data: |
            extends: default
            rules:
              document-start: disable
              line-length: disable

  # 2. Detect which registry files changed in this PR
  detect-registry-changes:
    name: Detect Registry Changes
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      javascript: ${{ steps.filter.outputs.javascript }}
      go: ${{ steps.filter.outputs.go }}
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            java:
              - 'dependency-registry/java.yaml'
            javascript:
              - 'dependency-registry/javascript.yaml'
            go:
              - 'dependency-registry/go.yaml'
            schema:
              - 'dependency-registry/schema.yaml'

  # 3. Enforce schema only for changed registry files
  schema-validation:
    name: Validate Against Schema
    runs-on: ubuntu-latest
    needs:
      - yaml-lint
      - detect-registry-changes
    if: |
      needs.detect-registry-changes.outputs.java == 'true' ||
      needs.detect-registry-changes.outputs.javascript == 'true' ||
      needs.detect-registry-changes.outputs.go == 'true' ||
      needs.detect-registry-changes.outputs.schema == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install JSON Schema Validator
        run: pip install check-jsonschema==0.37.0

      - name: Validate Go Registry
        if: needs.detect-registry-changes.outputs.go == 'true' || needs.detect-registry-changes.outputs.schema == 'true'
        run: check-jsonschema --schemafile dependency-registry/schema.yaml dependency-registry/go.yaml

      - name: Validate Java Registry
        if: needs.detect-registry-changes.outputs.java == 'true' || needs.detect-registry-changes.outputs.schema == 'true'
        run: check-jsonschema --schemafile dependency-registry/schema.yaml dependency-registry/java.yaml

      - name: Validate JavaScript Registry
        if: needs.detect-registry-changes.outputs.javascript == 'true' || needs.detect-registry-changes.outputs.schema == 'true'
        run: check-jsonschema --schemafile dependency-registry/schema.yaml dependency-registry/javascript.yaml